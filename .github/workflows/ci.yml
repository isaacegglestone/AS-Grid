name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Allow multiple CI runs on the same branch to run in parallel.
# Each push gets its own independent run — no cancellation.
concurrency:
  group: ci-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1a: Unit tests — fast gate (~1 min)
  # ---------------------------------------------------------------------------
  tests:
    name: "Unit tests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Unit tests
        run: python -m pytest --tb=short -q

  # ---------------------------------------------------------------------------
  # Stage 1b: Backtests — each variant runs in its own parallel job (~40 min each)
  #
  # Each PM24/PM25 variant is a separate matrix entry so results appear
  # individually in the GitHub Actions UI within ~40 min, instead of waiting
  # ~5.5 hrs for all variants to finish sequentially in a single job.
  #
  # Superseded backtests removed from CI (code kept in backtest_grid_bitunix.py):
  #   XRPPM2 (v12), XRPPM3 (v13), XRPPM4 (v14), XRPPM5 (v15)
  #   XRPPM9 (v19), XRPPM10 (v20)
  # These are fully superseded by later configs; run locally if needed.
  # ---------------------------------------------------------------------------
