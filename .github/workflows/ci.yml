name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Allow at most one run per ref at a time, but queue rather than cancel.
# cancel-in-progress: false means a new push will wait for the current run
# to finish before starting — critical for the sequential feature backtest chain.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Tests on free GitHub runner — runs on every push / PR
  # ---------------------------------------------------------------------------
  tests:
    name: "Stage 1: Tests (GitHub runner)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Unit tests
        run: python -m pytest --tb=short -q

      - name: Backtest XRP/USDT — v10 Indicator position management
        # klines are read from asBack/klines_cache/XRPUSDT_15min.parquet (committed).
        # To regenerate: run .github/workflows/cache-klines.yml manually, download
        # the artifact to asBack/klines_cache/, and commit the parquet file.
        run: python asBack/backtest_grid_bitunix.py XRPPM

  # ---------------------------------------------------------------------------
  # Stage 2: Tests on ephemeral EC2 — pauses for manual approval via the "ec2"
  #          GitHub Environment (Settings → Environments → ec2 → Required reviewers)
  #          Spins up t4g.nano in ap-southeast-1, runs tests, then destroys it.
  # ---------------------------------------------------------------------------
  ec2-tests:
    name: "Stage 2: Tests (ephemeral EC2)"
    runs-on: ubuntu-latest
    needs: tests
    environment: ec2

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Generate ephemeral SSH key pair
        run: |
          ssh-keygen -t ed25519 -f /tmp/test_key -N ""
          echo "TEST_PUBLIC_KEY=$(cat /tmp/test_key.pub)" >> $GITHUB_ENV
          echo "NAME_PREFIX=ci-${{ github.run_id }}" >> $GITHUB_ENV
          echo "RUNNER_CIDR=$(curl -sf https://checkip.amazonaws.com)/32" >> $GITHUB_ENV

      - name: Terraform init & apply
        run: |
          cd infra
          terraform init
          terraform apply -auto-approve \
            -var="ssh_public_key=${{ env.TEST_PUBLIC_KEY }}" \
            -var="name_prefix=${{ env.NAME_PREFIX }}" \
            -var="repo_branch=${{ github.head_ref || github.ref_name }}" \
            -var="allowed_ssh_cidr=${{ env.RUNNER_CIDR }}"
          echo "INSTANCE_IP=$(terraform output -raw instance_ip)" >> $GITHUB_ENV
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Wait for SSH to be available
        run: |
          echo "Waiting for SSH on ${{ env.INSTANCE_IP }}..."
          for i in $(seq 1 40); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -i /tmp/test_key ec2-user@${{ env.INSTANCE_IP }} 'echo ready' 2>/dev/null && break
            echo "Attempt $i/40 failed, retrying in 15s..."
            sleep 15
          done

      - name: Wait for cloud-init bootstrap to complete
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/test_key \
            ec2-user@${{ env.INSTANCE_IP }} \
            'until [ -f /var/lib/cloud/instance/boot-finished ]; do
               echo "bootstrap in progress..."; sleep 10
             done; echo "bootstrap complete"'

      - name: Unit tests on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/test_key \
            ec2-user@${{ env.INSTANCE_IP }} \
            'cd ~/AS-Grid && .venv/bin/python -m pytest --tb=short -q'

      - name: Backtest on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/test_key \
            ec2-user@${{ env.INSTANCE_IP }} \
            'cd ~/AS-Grid && .venv/bin/python asBack/backtest_grid_bitunix.py XRP'

      - name: Terraform destroy (always — prevent orphaned resources)
        if: always()
        run: |
          cd infra
          terraform destroy -auto-approve \
            -var="ssh_public_key=${{ env.TEST_PUBLIC_KEY || 'placeholder' }}" \
            -var="name_prefix=${{ env.NAME_PREFIX || 'ci-cleanup' }}" \
            -var="repo_branch=${{ github.head_ref || github.ref_name }}" \
            -var="allowed_ssh_cidr=${{ env.RUNNER_CIDR || '0.0.0.0/0' }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # ---------------------------------------------------------------------------
  # Stage 3: Deploy live bot — only on main branch after EC2 tests pass
  # ---------------------------------------------------------------------------
  deploy:
    name: "Stage 3: Deploy live bot"
    runs-on: ubuntu-latest
    needs: ec2-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: BITUNIX_API_KEY,BITUNIX_API_SECRET,COIN_NAME,GRID_SPACING,INITIAL_QUANTITY,LEVERAGE,ENABLE_NOTIFICATIONS,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            set -euo pipefail
            cd ~/AS-Grid

            echo "==> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Writing .env..."
            cat > .env << EOF
            API_KEY=${BITUNIX_API_KEY}
            API_SECRET=${BITUNIX_API_SECRET}
            COIN_NAME=${COIN_NAME:-XRP}
            GRID_SPACING=${GRID_SPACING:-0.004}
            INITIAL_QUANTITY=${INITIAL_QUANTITY:-1}
            LEVERAGE=${LEVERAGE:-20}
            ENABLE_NOTIFICATIONS=${ENABLE_NOTIFICATIONS:-false}
            TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
            TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
            EOF
            chmod 600 .env

            echo "==> Installing/updating Python dependencies..."
            .venv/bin/pip install -r requirements.txt -q

            echo "==> Restarting bot service..."
            sudo systemctl restart bitunix-bot

            echo "==> Service status..."
            sleep 3
            sudo systemctl status bitunix-bot --no-pager
        env:
          BITUNIX_API_KEY: ${{ secrets.BITUNIX_API_KEY }}
          BITUNIX_API_SECRET: ${{ secrets.BITUNIX_API_SECRET }}
          COIN_NAME: ${{ vars.COIN_NAME }}
          GRID_SPACING: ${{ vars.GRID_SPACING }}
          INITIAL_QUANTITY: ${{ vars.INITIAL_QUANTITY }}
          LEVERAGE: ${{ vars.LEVERAGE }}
          ENABLE_NOTIFICATIONS: ${{ vars.ENABLE_NOTIFICATIONS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
