            dispatch: "XRPPM43_6Y_BE"
          - name: "PM43 XRP 6Y Fees+10c"
            dispatch: "XRPPM43_6Y_10C"
          # ── Previous sweeps removed from CI (code retained in backtest_grid_bitunix.py):
          #   XRPPM6 (v16), XRPPM7 (v17), XRPPM8 (v18), XRPPM11 (v21),
          #   XRPPM12 (v22), XRPPM13 (v23), XRPPM15 (v25), XRPPM16 (v26),
          #   XRPPM17 (v27), XRPPM18 (v28), XRPPM19 (v29), XRPPM20 (v30),
          #   XRPPM21 (v31), XRPPM22 (v32), XRPPM21FULL, XRPPM23FULL
          # These are fully superseded; run locally if needed.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      # Restore klines parquets from Actions cache (populated by cache-klines.yml).
      # Includes both 1min (large, cache-only) and 15min (also committed to git
      # but may not be in the checked-out commit yet for new symbols).
      # restore-keys falls back to prior cache versions for partial hits.
      - name: Restore klines from Actions cache
        id: cache-klines
        uses: actions/cache/restore@v4
        with:
          path: |
            asBack/klines_cache/XRPUSDT_1min.parquet
            asBack/klines_cache/BTCUSDT_1min.parquet
            asBack/klines_cache/XRPUSDT_15min.parquet
            asBack/klines_cache/BTCUSDT_15min.parquet
          key: klines-v3-${{ hashFiles('scripts/generate_klines_cache.py') }}
          restore-keys: |
            klines-v3-
            klines-1min-v2-

      # Cache miss fallback: generate parquets inline (~15 min per symbol).
      - name: Generate klines parquets (cache miss fallback)
        if: steps.cache-klines.outputs.cache-hit != 'true'
        run: python scripts/generate_klines_cache.py

      - name: Save klines parquets to Actions cache (if freshly generated)
        if: steps.cache-klines.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            asBack/klines_cache/XRPUSDT_1min.parquet
            asBack/klines_cache/BTCUSDT_1min.parquet
            asBack/klines_cache/XRPUSDT_15min.parquet
            asBack/klines_cache/BTCUSDT_15min.parquet
          key: klines-v3-${{ hashFiles('scripts/generate_klines_cache.py') }}

      # Restore funding rate parquets from Actions cache (populated by cache-funding.yml).
      - name: Restore funding rates from Actions cache
        id: cache-funding
        uses: actions/cache/restore@v4
        with:
          path: |
            asBack/klines_cache/XRPUSDT_funding.parquet
            asBack/klines_cache/BTCUSDT_funding.parquet
          key: funding-v1-${{ hashFiles('scripts/generate_funding_cache.py') }}
          restore-keys: |
            funding-v1-

      # Funding cache miss fallback: generate inline.
      # continue-on-error because Binance blocks US IPs (HTTP 451).
      # Funding parquets are also committed to git as a fallback.
      - name: Generate funding parquets (cache miss fallback)
        if: steps.cache-funding.outputs.cache-hit != 'true'
        continue-on-error: true
        run: python scripts/generate_funding_cache.py

      - name: Save funding parquets to Actions cache (if freshly generated)
        if: steps.cache-funding.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            asBack/klines_cache/XRPUSDT_funding.parquet
            asBack/klines_cache/BTCUSDT_funding.parquet
          key: funding-v1-${{ hashFiles('scripts/generate_funding_cache.py') }}

      - name: "Run backtest: ${{ matrix.dispatch }}"
        run: python asBack/backtest_grid_bitunix.py ${{ matrix.dispatch }}

      - name: Run gap analysis
        if: always() && !startsWith(matrix.dispatch, 'BTCPM39') && !startsWith(matrix.dispatch, 'XRPPM39') && !startsWith(matrix.dispatch, 'BTCPM40') && !startsWith(matrix.dispatch, 'XRPPM40') && !startsWith(matrix.dispatch, 'XRPPM41') && !startsWith(matrix.dispatch, 'XRPPM42') && !startsWith(matrix.dispatch, 'XRPPM43')
        run: python scripts/analyze_gaps.py bitunix_best_grid_trades.csv bitunix_best_equity_curve.csv

      - name: Upload backtest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ matrix.name }}
          path: |
            bitunix_grid_search_results.csv
            bitunix_best_grid_trades.csv
            bitunix_best_equity_curve.csv
            bitunix_hedge_repair_results.csv
            gap_analysis_daily.csv
            gap_analysis_report.html
          if-no-files-found: warn
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Stage 2: Tests on ephemeral EC2 — pauses for manual approval via the "ec2"
  #          GitHub Environment (Settings → Environments → ec2 → Required reviewers)
  #          Spins up t4g.nano in ap-southeast-1, runs tests, then destroys it.
  # ---------------------------------------------------------------------------
  ec2-tests:
    name: "Stage 2: Tests (ephemeral EC2)"
    runs-on: ubuntu-latest
    needs: backtests
    if: github.ref == 'refs/heads/main'
    environment: ec2

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Generate ephemeral SSH key pair
        run: |
          ssh-keygen -t ed25519 -f /tmp/test_key -N ""
          echo "TEST_PUBLIC_KEY=$(cat /tmp/test_key.pub)" >> $GITHUB_ENV
          echo "NAME_PREFIX=ci-${{ github.run_id }}" >> $GITHUB_ENV
          echo "RUNNER_CIDR=$(curl -sf https://checkip.amazonaws.com)/32" >> $GITHUB_ENV

      - name: Terraform init & apply
        run: |
          cd infra
          terraform init
          terraform apply -auto-approve \
            -var="ssh_public_key=${{ env.TEST_PUBLIC_KEY }}" \
            -var="name_prefix=${{ env.NAME_PREFIX }}" \
            -var="repo_branch=${{ github.head_ref || github.ref_name }}" \
            -var="allowed_ssh_cidr=${{ env.RUNNER_CIDR }}"
          echo "INSTANCE_IP=$(terraform output -raw instance_ip)" >> $GITHUB_ENV
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Wait for SSH to be available
        run: |
          echo "Waiting for SSH on ${{ env.INSTANCE_IP }}..."
          for i in $(seq 1 40); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -i /tmp/test_key ec2-user@${{ env.INSTANCE_IP }} 'echo ready' 2>/dev/null && break
            echo "Attempt $i/40 failed, retrying in 15s..."
            sleep 15
          done

      - name: Wait for cloud-init bootstrap to complete
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/test_key \
            ec2-user@${{ env.INSTANCE_IP }} \
            'until [ -f /var/lib/cloud/instance/boot-finished ]; do
               echo "bootstrap in progress..."; sleep 10
             done; echo "bootstrap complete"'

      - name: Unit tests on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/test_key \
            ec2-user@${{ env.INSTANCE_IP }} \
            'cd ~/AS-Grid && .venv/bin/python -m pytest --tb=short -q'

      - name: Backtest on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/test_key \
            ec2-user@${{ env.INSTANCE_IP }} \
            'cd ~/AS-Grid && .venv/bin/python asBack/backtest_grid_bitunix.py XRP'

      - name: Terraform destroy (always — prevent orphaned resources)
        if: always()
        run: |
          cd infra
          terraform destroy -auto-approve \
            -var="ssh_public_key=${{ env.TEST_PUBLIC_KEY || 'placeholder' }}" \
            -var="name_prefix=${{ env.NAME_PREFIX || 'ci-cleanup' }}" \
            -var="repo_branch=${{ github.head_ref || github.ref_name }}" \
            -var="allowed_ssh_cidr=${{ env.RUNNER_CIDR || '0.0.0.0/0' }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # ---------------------------------------------------------------------------
  # Stage 3: Deploy live bot — only on main branch after EC2 tests pass
  # ---------------------------------------------------------------------------
  deploy:
    name: "Stage 3: Deploy live bot"
    runs-on: ubuntu-latest
    needs: ec2-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: BITUNIX_API_KEY,BITUNIX_API_SECRET,COIN_NAME,GRID_SPACING,INITIAL_QUANTITY,LEVERAGE,ENABLE_NOTIFICATIONS,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            set -euo pipefail
            cd ~/AS-Grid

            echo "==> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Writing .env..."
            cat > .env << EOF
            API_KEY=${BITUNIX_API_KEY}
            API_SECRET=${BITUNIX_API_SECRET}
            COIN_NAME=${COIN_NAME:-XRP}
            GRID_SPACING=${GRID_SPACING:-0.004}
            INITIAL_QUANTITY=${INITIAL_QUANTITY:-1}
            LEVERAGE=${LEVERAGE:-20}
            ENABLE_NOTIFICATIONS=${ENABLE_NOTIFICATIONS:-false}
            TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
            TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
            EOF
            chmod 600 .env

            echo "==> Installing/updating Python dependencies..."
            .venv/bin/pip install -r requirements.txt -q

            echo "==> Restarting bot service..."
            sudo systemctl restart bitunix-bot

            echo "==> Service status..."
            sleep 3
            sudo systemctl status bitunix-bot --no-pager
        env:
          BITUNIX_API_KEY: ${{ secrets.BITUNIX_API_KEY }}
          BITUNIX_API_SECRET: ${{ secrets.BITUNIX_API_SECRET }}
          COIN_NAME: ${{ vars.COIN_NAME }}
          GRID_SPACING: ${{ vars.GRID_SPACING }}
          INITIAL_QUANTITY: ${{ vars.INITIAL_QUANTITY }}
          LEVERAGE: ${{ vars.LEVERAGE }}
          ENABLE_NOTIFICATIONS: ${{ vars.ENABLE_NOTIFICATIONS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
