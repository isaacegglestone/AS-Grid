name: CI

on:
    push:
        branches: ["**"]
    pull_request:
        branches: [main]

jobs:
    # ---------------------------------------------------------------------------
    # 1. Unit tests — fast, no network calls
    # ---------------------------------------------------------------------------
    unit-tests:
        name: Unit tests
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: pip

            - name: Install dependencies
              run: python -m pip install -r requirements.txt

            - name: Run unit tests
              run: python -m pytest --tb=short -q

    # ---------------------------------------------------------------------------
    # 2. Integration test — runs backtest against live Bitunix public klines API
    #    (no API key needed, kline data is public)
    # ---------------------------------------------------------------------------
    integration-test:
        name: Backtest (integration)
        runs-on: ubuntu-latest
        needs: unit-tests # only run if unit tests pass

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: pip

            - name: Install dependencies
              run: python -m pip install -r requirements.txt

            - name: Run backtest
              run: python asBack/backtest_grid_bitunix.py
