name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Allow multiple CI runs on the same branch to run in parallel.
# Each push gets its own independent run — no cancellation.
concurrency:
  group: ci-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1a: Unit tests — fast gate (~1 min)
  # ---------------------------------------------------------------------------
  tests:
    name: "Unit tests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Unit tests
        run: python -m pytest --tb=short -q

  # ---------------------------------------------------------------------------
  # Stage 1b: Backtests — each config runs in its own parallel job (~40 min each)
  #
  # Superseded backtests removed from CI (code kept in backtest_grid_bitunix.py):
  #   XRPPM2 (v12), XRPPM3 (v13), XRPPM4 (v14), XRPPM5 (v15)
  #   XRPPM9 (v19), XRPPM10 (v20)
  # These are fully superseded by later configs; run locally if needed.
  # ---------------------------------------------------------------------------
  backtests:
    name: "Backtest ${{ matrix.name }}"
    runs-on: ubuntu-latest
    needs: tests
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── PM24: 5-regime rotation sweep across full 8.8yr stitched cache ──
          - name: "PM24 FULL — 5-regime rotation sweep (8.8yr)"
            dispatch: XRPPM24FULL
          # ── Previous sweeps removed from CI (code retained in backtest_grid_bitunix.py):
          #   XRPPM6 (v16), XRPPM7 (v17), XRPPM8 (v18), XRPPM11 (v21),
          #   XRPPM12 (v22), XRPPM13 (v23), XRPPM15 (v25), XRPPM16 (v26),
          #   XRPPM17 (v27), XRPPM18 (v28), XRPPM19 (v29), XRPPM20 (v30),
          #   XRPPM21 (v31), XRPPM22 (v32), XRPPM21FULL, XRPPM23FULL
          # These are fully superseded; run locally if needed.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      # Restore the ~54 MB 1min parquet from Actions cache (populated by cache-klines.yml).
      - name: Restore 1min klines from Actions cache
        id: cache-1min
        uses: actions/cache/restore@v4
        with:
          path: asBack/klines_cache/XRPUSDT_1min.parquet
          key: klines-1min-v1-${{ hashFiles('scripts/generate_klines_cache.py') }}

      # Cache miss fallback: generate the 1min parquet inline (~15 min).
      - name: Generate 1min parquet (cache miss fallback)
        if: steps.cache-1min.outputs.cache-hit != 'true'
        run: python scripts/generate_klines_cache.py

      - name: Save 1min parquet to Actions cache (if freshly generated)
        if: steps.cache-1min.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: asBack/klines_cache/XRPUSDT_1min.parquet
          key: klines-1min-v1-${{ hashFiles('scripts/generate_klines_cache.py') }}

      - name: "Run backtest: ${{ matrix.dispatch }}"
        run: python asBack/backtest_grid_bitunix.py ${{ matrix.dispatch }}

      - name: Run gap analysis
        if: always()
        run: python scripts/analyze_gaps.py bitunix_best_grid_trades.csv bitunix_best_equity_curve.csv

      - name: Upload backtest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ matrix.dispatch }}
          path: |
            bitunix_grid_search_results.csv
            bitunix_best_grid_trades.csv
            bitunix_best_equity_curve.csv
            gap_analysis_daily.csv
            gap_analysis_report.html
          if-no-files-found: warn
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Stage 2: Tests on ephemeral EC2 — pauses for manual approval via the "ec2"
  #          GitHub Environment (Settings → Environments → ec2 → Required reviewers)
  #          Spins up t4g.nano in ap-southeast-1, runs tests, then destroys it.
  # ---------------------------------------------------------------------------
  ec2-tests:
    name: "Stage 2: Tests (ephemeral EC2)"
    runs-on: ubuntu-latest
    needs: backtests
    if: github.ref == 'refs/heads/main'
    environment: ec2

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Generate ephemeral SSH key pair
        run: |
          ssh-keygen -t ed25519 -f /tmp/test_key -N ""
          echo "TEST_PUBLIC_KEY=$(cat /tmp/test_key.pub)" >> $GITHUB_ENV
          echo "NAME_PREFIX=ci-${{ github.run_id }}" >> $GITHUB_ENV
          echo "RUNNER_CIDR=$(curl -sf https://checkip.amazonaws.com)/32" >> $GITHUB_ENV

      - name: Terraform init & apply
        run: |
          cd infra
          terraform init
          terraform apply -auto-approve \
            -var="ssh_public_key=${{ env.TEST_PUBLIC_KEY }}" \
            -var="name_prefix=${{ env.NAME_PREFIX }}" \
            -var="repo_branch=${{ github.head_ref || github.ref_name }}" \
            -var="allowed_ssh_cidr=${{ env.RUNNER_CIDR }}"
          echo "INSTANCE_IP=$(terraform output -raw instance_ip)" >> $GITHUB_ENV
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Wait for SSH to be available
        run: |
          echo "Waiting for SSH on ${{ env.INSTANCE_IP }}..."
          for i in $(seq 1 40); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -i /tmp/test_key ec2-user@${{ env.INSTANCE_IP }} 'echo ready' 2>/dev/null && break
            echo "Attempt $i/40 failed, retrying in 15s..."
            sleep 15
          done

      - name: Wait for cloud-init bootstrap to complete
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/test_key \
            ec2-user@${{ env.INSTANCE_IP }} \
            'until [ -f /var/lib/cloud/instance/boot-finished ]; do
               echo "bootstrap in progress..."; sleep 10
             done; echo "bootstrap complete"'

      - name: Unit tests on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/test_key \
            ec2-user@${{ env.INSTANCE_IP }} \
            'cd ~/AS-Grid && .venv/bin/python -m pytest --tb=short -q'

      - name: Backtest on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/test_key \
            ec2-user@${{ env.INSTANCE_IP }} \
            'cd ~/AS-Grid && .venv/bin/python asBack/backtest_grid_bitunix.py XRP'

      - name: Terraform destroy (always — prevent orphaned resources)
        if: always()
        run: |
          cd infra
          terraform destroy -auto-approve \
            -var="ssh_public_key=${{ env.TEST_PUBLIC_KEY || 'placeholder' }}" \
            -var="name_prefix=${{ env.NAME_PREFIX || 'ci-cleanup' }}" \
            -var="repo_branch=${{ github.head_ref || github.ref_name }}" \
            -var="allowed_ssh_cidr=${{ env.RUNNER_CIDR || '0.0.0.0/0' }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # ---------------------------------------------------------------------------
  # Stage 3: Deploy live bot — only on main branch after EC2 tests pass
  # ---------------------------------------------------------------------------
  deploy:
    name: "Stage 3: Deploy live bot"
    runs-on: ubuntu-latest
    needs: ec2-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: BITUNIX_API_KEY,BITUNIX_API_SECRET,COIN_NAME,GRID_SPACING,INITIAL_QUANTITY,LEVERAGE,ENABLE_NOTIFICATIONS,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            set -euo pipefail
            cd ~/AS-Grid

            echo "==> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Writing .env..."
            cat > .env << EOF
            API_KEY=${BITUNIX_API_KEY}
            API_SECRET=${BITUNIX_API_SECRET}
            COIN_NAME=${COIN_NAME:-XRP}
            GRID_SPACING=${GRID_SPACING:-0.004}
            INITIAL_QUANTITY=${INITIAL_QUANTITY:-1}
            LEVERAGE=${LEVERAGE:-20}
            ENABLE_NOTIFICATIONS=${ENABLE_NOTIFICATIONS:-false}
            TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
            TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
            EOF
            chmod 600 .env

            echo "==> Installing/updating Python dependencies..."
            .venv/bin/pip install -r requirements.txt -q

            echo "==> Restarting bot service..."
            sudo systemctl restart bitunix-bot

            echo "==> Service status..."
            sleep 3
            sudo systemctl status bitunix-bot --no-pager
        env:
          BITUNIX_API_KEY: ${{ secrets.BITUNIX_API_KEY }}
          BITUNIX_API_SECRET: ${{ secrets.BITUNIX_API_SECRET }}
          COIN_NAME: ${{ vars.COIN_NAME }}
          GRID_SPACING: ${{ vars.GRID_SPACING }}
          INITIAL_QUANTITY: ${{ vars.INITIAL_QUANTITY }}
          LEVERAGE: ${{ vars.LEVERAGE }}
          ENABLE_NOTIFICATIONS: ${{ vars.ENABLE_NOTIFICATIONS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
