name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Allow at most one run per ref at a time, but queue rather than cancel.
# cancel-in-progress: false means a new push will wait for the current run
# to finish before starting — critical for the sequential feature backtest chain.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Tests on free GitHub runner — runs on every push / PR
  # ---------------------------------------------------------------------------
  tests:
    name: "Stage 1: Tests (GitHub runner)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Unit tests
        run: python -m pytest --tb=short -q

      # Restore the ~54 MB 1min parquet from Actions cache (populated by cache-klines.yml).
      # Cache key matches cache-klines.yml so both workflows share the same entry.
      - name: Restore 1min klines from Actions cache
        id: cache-1min
        uses: actions/cache/restore@v4
        with:
          path: asBack/klines_cache/XRPUSDT_1min.parquet
          key: klines-1min-v1-${{ hashFiles('scripts/generate_klines_cache.py') }}

      # Cache miss fallback: generate the 1min parquet inline (~15 min, Bitunix API).
      # This only runs on the very first CI trigger before cache-klines.yml has seeded the cache.
      - name: Generate 1min parquet (cache miss fallback)
        if: steps.cache-1min.outputs.cache-hit != 'true'
        run: python scripts/generate_klines_cache.py

      - name: Save 1min parquet to Actions cache (if freshly generated)
        if: steps.cache-1min.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: asBack/klines_cache/XRPUSDT_1min.parquet
          key: klines-1min-v1-${{ hashFiles('scripts/generate_klines_cache.py') }}

      - name: Backtest XRP/USDT — v12 PM tuning (A/B/C options)
        # 15min parquet: read from asBack/klines_cache/XRPUSDT_15min.parquet (committed).
        # 1min parquet:  restored from Actions cache above (keyed on generate script hash).
        run: python asBack/backtest_grid_bitunix.py XRPPM2

      - name: Backtest XRP/USDT — v13 C_gridvol parameter sweep (floor × period)
        # Dials in the two knobs of the XRPPM2 winning variant (C_gridvol):
        #   floor   — min order size fraction: 0.20 / 0.35 (default) / 0.50
        #   period  — vol SMA lookback: 10 / 20 (default) / 40
        run: python asBack/backtest_grid_bitunix.py XRPPM3

      - name: Backtest XRP/USDT — v14 C_gridvol period fine-sweep
        # XRPPM3 showed floor is irrelevant; period=40 best 2y result.
        # Fine-sweep: p20 (ctrl) / p30 / p40 / p50 / p60 / p80 / p120
        run: python asBack/backtest_grid_bitunix.py XRPPM4

      - name: Backtest XRP/USDT — v15 multi-timeframe regime filter sweep
        # Build on XRPPM4 winner (C_gridvol, period=40).
        # 15min EMA filter suppresses long grid entries in bearish regimes.
        # Variants: baseline (no filter) / ema100 / ema200 / ema400
        run: python asBack/backtest_grid_bitunix.py XRPPM5

      - name: Backtest XRP/USDT — v16 XRPPM6 comprehensive sweep
        # Sweeps 6 dimensions on top of XRPPM5 winner (ema200, h2%, p50):
        #   (A) hysteresis: h0/h1/h2(ctrl)/h3/h5
        #   (B) EMA fine-tune: e150/e175/e200(ctrl)/e225/e250
        #   (C) vol_period compound: p40 vs p50(ctrl) + ema200
        #   (D) grid spacing: sp05/sp07/sp10(ctrl)/sp15 — grid harvesting
        #   (E) grid depth: d3(ctrl)/d4/d5 — capital utilisation
        #   (F) short boost below EMA: sb4/sb5
        run: python asBack/backtest_grid_bitunix.py XRPPM6

      - name: Backtest XRP/USDT — v17 XRPPM7 leverage + equity-proportional sizing
        # Base: XRPPM6 winners applied — sp15 (1.5% spacing, +11.6pp 2y) + ema175.
        # Expected baseline: ~30.54% 2y (was 18.93% before sp15 fix).
        # Sweeps 4 groups to maximise absolute dollar P&L:
        #   (L) leverage: 1x(ctrl) / 1.5x / 2x / 3x
        #   (P) equity-pct: eqp10(=start) / eqp12 / eqp15 — compounding
        #   (LP) combined: l2_eqp10 / l15_eqp10
        #   (S) asymmetric short spacing below EMA: as07 / as05
        run: python asBack/backtest_grid_bitunix.py XRPPM7

      - name: Backtest XRP/USDT — v18 XRPPM8 hysteresis + spacing on l2 base
        # Base: _V8_BASE = _V7_BASE + leverage=2.0 (pm7_l2 winner: 54.23% 2y, 0.99% dd).
        # Two open questions from XRPPM7:
        #   (H) Does h0 stack on l2? (h0 gave +2pp on pm6 baseline — does it hold on sp15+l2?)
        #       h0=0.0 (no band) / h1=0.01 (1% band) vs h2%=0.02 (current)
        #   (S) Spacing fill-in: sp10 → sp12 → sp13 → sp15(baseline)
        #       sp15: 78 trades/6m, 30.54% 2y | sp10: 294 trades/6m, 18.93% 2y
        #       Goal: more fills than 78/6m without the 2y collapse of sp10 (-0.82% 2y w/ l1)
        #   (C) Cross: h0 × sp12 interaction
        run: python asBack/backtest_grid_bitunix.py XRPPM8

      - name: Backtest XRP/USDT — v19 XRPPM9 adaptive spacing (VAS + BTBW)
        # Base: _V9_BASE = _V8_BASE (update with XRPPM8 winner post run #91).
        # Core insight from run #90 loss audit: the ONLY loss mechanism is grid SL cycling.
        # No CBs or halt events ever fire on XRP.  Sub-1.5% oscillations are left on the table.
        # Two adaptive spacing strategies to capture them without sp07's 2y SL cascade:
        #   (V) Vol-Adaptive Spacing (VAS): eff_spacing = base × (ATR/price) / EMA(ATR/price)
        #       Calm/bull → tight spacing (captures oscillations); volatile/bear → wide (protects).
        #       Variants: vas (floor=0.010), vas_tight (floor=0.007), vas_wide (ceil=0.025)
        #   (B) Bull-Tight Bear-Wide (BTBW): two-speed regime grid
        #       Bull regime (price ≥ EMA*(1-hyst)): bull_spacing (0.007–0.010)
        #       Bear regime (price < EMA*(1-hyst)): bear_spacing=0.015 (sp15 protection)
        #       Variants: btbw (bull=0.010), btbw_tight (0.008), btbw_xtight (0.007)
        run: python asBack/backtest_grid_bitunix.py XRPPM9

  # ---------------------------------------------------------------------------
  # Stage 2: Tests on ephemeral EC2 — pauses for manual approval via the "ec2"
  #          GitHub Environment (Settings → Environments → ec2 → Required reviewers)
  #          Spins up t4g.nano in ap-southeast-1, runs tests, then destroys it.
  # ---------------------------------------------------------------------------
  ec2-tests:
    name: "Stage 2: Tests (ephemeral EC2)"
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main'
    environment: ec2

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Generate ephemeral SSH key pair
        run: |
          ssh-keygen -t ed25519 -f /tmp/test_key -N ""
          echo "TEST_PUBLIC_KEY=$(cat /tmp/test_key.pub)" >> $GITHUB_ENV
          echo "NAME_PREFIX=ci-${{ github.run_id }}" >> $GITHUB_ENV
          echo "RUNNER_CIDR=$(curl -sf https://checkip.amazonaws.com)/32" >> $GITHUB_ENV

      - name: Terraform init & apply
        run: |
          cd infra
          terraform init
          terraform apply -auto-approve \
            -var="ssh_public_key=${{ env.TEST_PUBLIC_KEY }}" \
            -var="name_prefix=${{ env.NAME_PREFIX }}" \
            -var="repo_branch=${{ github.head_ref || github.ref_name }}" \
            -var="allowed_ssh_cidr=${{ env.RUNNER_CIDR }}"
          echo "INSTANCE_IP=$(terraform output -raw instance_ip)" >> $GITHUB_ENV
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Wait for SSH to be available
        run: |
          echo "Waiting for SSH on ${{ env.INSTANCE_IP }}..."
          for i in $(seq 1 40); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -i /tmp/test_key ec2-user@${{ env.INSTANCE_IP }} 'echo ready' 2>/dev/null && break
            echo "Attempt $i/40 failed, retrying in 15s..."
            sleep 15
          done

      - name: Wait for cloud-init bootstrap to complete
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/test_key \
            ec2-user@${{ env.INSTANCE_IP }} \
            'until [ -f /var/lib/cloud/instance/boot-finished ]; do
               echo "bootstrap in progress..."; sleep 10
             done; echo "bootstrap complete"'

      - name: Unit tests on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/test_key \
            ec2-user@${{ env.INSTANCE_IP }} \
            'cd ~/AS-Grid && .venv/bin/python -m pytest --tb=short -q'

      - name: Backtest on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/test_key \
            ec2-user@${{ env.INSTANCE_IP }} \
            'cd ~/AS-Grid && .venv/bin/python asBack/backtest_grid_bitunix.py XRP'

      - name: Terraform destroy (always — prevent orphaned resources)
        if: always()
        run: |
          cd infra
          terraform destroy -auto-approve \
            -var="ssh_public_key=${{ env.TEST_PUBLIC_KEY || 'placeholder' }}" \
            -var="name_prefix=${{ env.NAME_PREFIX || 'ci-cleanup' }}" \
            -var="repo_branch=${{ github.head_ref || github.ref_name }}" \
            -var="allowed_ssh_cidr=${{ env.RUNNER_CIDR || '0.0.0.0/0' }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # ---------------------------------------------------------------------------
  # Stage 3: Deploy live bot — only on main branch after EC2 tests pass
  # ---------------------------------------------------------------------------
  deploy:
    name: "Stage 3: Deploy live bot"
    runs-on: ubuntu-latest
    needs: ec2-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: BITUNIX_API_KEY,BITUNIX_API_SECRET,COIN_NAME,GRID_SPACING,INITIAL_QUANTITY,LEVERAGE,ENABLE_NOTIFICATIONS,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            set -euo pipefail
            cd ~/AS-Grid

            echo "==> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Writing .env..."
            cat > .env << EOF
            API_KEY=${BITUNIX_API_KEY}
            API_SECRET=${BITUNIX_API_SECRET}
            COIN_NAME=${COIN_NAME:-XRP}
            GRID_SPACING=${GRID_SPACING:-0.004}
            INITIAL_QUANTITY=${INITIAL_QUANTITY:-1}
            LEVERAGE=${LEVERAGE:-20}
            ENABLE_NOTIFICATIONS=${ENABLE_NOTIFICATIONS:-false}
            TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
            TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
            EOF
            chmod 600 .env

            echo "==> Installing/updating Python dependencies..."
            .venv/bin/pip install -r requirements.txt -q

            echo "==> Restarting bot service..."
            sudo systemctl restart bitunix-bot

            echo "==> Service status..."
            sleep 3
            sudo systemctl status bitunix-bot --no-pager
        env:
          BITUNIX_API_KEY: ${{ secrets.BITUNIX_API_KEY }}
          BITUNIX_API_SECRET: ${{ secrets.BITUNIX_API_SECRET }}
          COIN_NAME: ${{ vars.COIN_NAME }}
          GRID_SPACING: ${{ vars.GRID_SPACING }}
          INITIAL_QUANTITY: ${{ vars.INITIAL_QUANTITY }}
          LEVERAGE: ${{ vars.LEVERAGE }}
          ENABLE_NOTIFICATIONS: ${{ vars.ENABLE_NOTIFICATIONS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
