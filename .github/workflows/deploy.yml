name: Deploy

on:
    # Manual trigger only — prevents accidental deploys.
    # Set confirm=yes and provide all secrets before running.
    workflow_dispatch:
        inputs:
            confirm:
                description: 'Type "yes" to confirm deploy to production'
                required: true
                default: ""

# Only one deploy at a time
concurrency:
    group: deploy-production
    cancel-in-progress: false

jobs:
    # ---------------------------------------------------------------------------
    # Guard — abort immediately if confirm input is wrong
    # ---------------------------------------------------------------------------
    confirm-check:
        name: Confirm deploy intent
        runs-on: ubuntu-latest
        steps:
            - name: Check confirmation
              run: |
                  if [ "${{ github.event.inputs.confirm }}" != "yes" ]; then
                    echo "::error::Deploy not confirmed. Set confirm=yes to proceed."
                    exit 1
                  fi

    # ---------------------------------------------------------------------------
    # 1. Unit tests
    # ---------------------------------------------------------------------------
    unit-tests:
        name: Unit tests
        runs-on: ubuntu-latest
        needs: confirm-check

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
                  cache: pip

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run unit tests
              run: python -m pytest --tb=short -q

    # ---------------------------------------------------------------------------
    # 2. Integration test — backtest must pass before any deploy
    # ---------------------------------------------------------------------------
    integration-test:
        name: Backtest (integration)
        runs-on: ubuntu-latest
        needs: unit-tests

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
                  cache: pip

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run backtest
              run: python asBack/backtest_grid_bitunix.py

    # ---------------------------------------------------------------------------
    # 3. Deploy to EC2
    # ---------------------------------------------------------------------------
    deploy:
        name: Deploy to EC2
        runs-on: ubuntu-latest
        needs: integration-test # only runs if both test jobs pass

        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ec2-user
                  key: ${{ secrets.EC2_SSH_KEY }}
                  envs: BITUNIX_API_KEY,BITUNIX_API_SECRET,COIN_NAME,GRID_SPACING,INITIAL_QUANTITY,LEVERAGE,ENABLE_NOTIFICATIONS,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
                  script: |
                      set -euo pipefail
                      cd ~/AS-Grid

                      echo "==> Pulling latest code..."
                      git fetch origin main
                      git reset --hard origin/main

                      echo "==> Writing .env..."
                      cat > .env << EOF
                      API_KEY=${BITUNIX_API_KEY}
                      API_SECRET=${BITUNIX_API_SECRET}
                      COIN_NAME=${COIN_NAME:-XRP}
                      GRID_SPACING=${GRID_SPACING:-0.004}
                      INITIAL_QUANTITY=${INITIAL_QUANTITY:-1}
                      LEVERAGE=${LEVERAGE:-20}
                      ENABLE_NOTIFICATIONS=${ENABLE_NOTIFICATIONS:-false}
                      TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
                      TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
                      EOF
                      chmod 600 .env

                      echo "==> Installing/updating Python dependencies..."
                      .venv/bin/pip install -r requirements.txt -q

                      echo "==> Restarting bot service..."
                      sudo systemctl restart bitunix-bot

                      echo "==> Checking service status..."
                      sleep 3
                      sudo systemctl status bitunix-bot --no-pager
              env:
                  BITUNIX_API_KEY: ${{ secrets.BITUNIX_API_KEY }}
                  BITUNIX_API_SECRET: ${{ secrets.BITUNIX_API_SECRET }}
                  COIN_NAME: ${{ vars.COIN_NAME }}
                  GRID_SPACING: ${{ vars.GRID_SPACING }}
                  INITIAL_QUANTITY: ${{ vars.INITIAL_QUANTITY }}
                  LEVERAGE: ${{ vars.LEVERAGE }}
                  ENABLE_NOTIFICATIONS: ${{ vars.ENABLE_NOTIFICATIONS }}
                  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
