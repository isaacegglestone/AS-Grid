name: Generate klines cache

# Triggers:
#   1. push — runs automatically on any branch push so it can be triggered
#      from feature branches (workflow_dispatch only works from default branch).
#      A guard step skips the expensive fetch if the 15min parquet is committed
#      and the 1min parquet is already in the Actions cache.
#   2. workflow_dispatch — manual re-run to refresh data.
#
# Storage strategy:
#   15min parquets (~3-5 MB each)  — committed to git (stable historical data).
#   1min parquets  (~50-100 MB each) — stored in GitHub Actions cache only.
#
# Supported symbols: XRPUSDT, BTCUSDT.
# No secrets required — the Bitunix klines endpoint is public.
on:
  push:
    branches: ["**"]
    paths:
      - "scripts/generate_klines_cache.py"
      - ".github/workflows/cache-klines.yml"
  workflow_dispatch:

jobs:
  generate:
    name: Fetch & cache klines parquet
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Try to restore the 1min parquets from Actions cache before deciding to skip.
      - name: Restore 1min parquets from Actions cache
        id: cache-1min
        uses: actions/cache/restore@v4
        with:
          path: |
            asBack/klines_cache/XRPUSDT_1min.parquet
            asBack/klines_cache/BTCUSDT_1min.parquet
          key: klines-1min-v2-${{ hashFiles('scripts/generate_klines_cache.py') }}

      # Skip if both 15min parquets are committed AND 1min are already cached.
      - name: Check if all parquets are available
        id: check
        run: |
          if [ -f "asBack/klines_cache/XRPUSDT_15min.parquet" ] && \
             [ -f "asBack/klines_cache/BTCUSDT_15min.parquet" ] && \
             [ "${{ steps.cache-1min.outputs.cache-hit }}" = "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "All parquets present — skipping fetch."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "One or more parquets missing — will fetch."
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.skip == 'false'
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: python -m pip install -r requirements.txt

      - name: Generate klines parquet cache
        if: steps.check.outputs.skip == 'false'
        run: python scripts/generate_klines_cache.py

      # Commit the small 15min parquets back to the branch (stable historical data).
      - name: Commit 15min parquets to branch
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add asBack/klines_cache/XRPUSDT_15min.parquet asBack/klines_cache/BTCUSDT_15min.parquet
          git diff --cached --quiet || (git commit -m "data: regenerate 15min klines cache [skip ci]" && git push)

      # Store the large 1min parquets in Actions cache (not committed to git).
      - name: Save 1min parquets to Actions cache
        if: steps.check.outputs.skip == 'false'
        uses: actions/cache/save@v4
        with:
          path: |
            asBack/klines_cache/XRPUSDT_1min.parquet
            asBack/klines_cache/BTCUSDT_1min.parquet
          key: klines-1min-v2-${{ hashFiles('scripts/generate_klines_cache.py') }}
