name: Generate klines cache

# Triggers:
#   1. push — runs automatically on any branch push so it can be triggered
#      from feature branches (workflow_dispatch only works from default branch).
#      A guard step skips the expensive fetch once both parquets are committed.
#   2. workflow_dispatch — manual re-run to refresh data.
#
# No secrets required — the Bitunix klines endpoint is public.
on:
  push:
    branches: ["**"]
    paths:
      - "scripts/generate_klines_cache.py"
      - ".github/workflows/cache-klines.yml"
  workflow_dispatch:

jobs:
  generate:
    name: Fetch & cache klines parquet
    runs-on: ubuntu-latest
    # Need write access to push the parquets back to the branch
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN — write permission granted above
          token: ${{ secrets.GITHUB_TOKEN }}

      # Skip the expensive fetch if both parquets are already committed.
      - name: Check if parquets already committed
        id: check
        run: |
          if [ -f "asBack/klines_cache/XRPUSDT_15min.parquet" ] && [ -f "asBack/klines_cache/XRPUSDT_1min.parquet" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Both parquets already committed — skipping fetch."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "One or more parquets missing — will fetch."
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.skip == 'false'
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: python -m pip install -r requirements.txt

      - name: Generate klines parquet cache
        if: steps.check.outputs.skip == 'false'
        run: python scripts/generate_klines_cache.py

      - name: Commit parquets back to branch
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add asBack/klines_cache/XRPUSDT_15min.parquet asBack/klines_cache/XRPUSDT_1min.parquet
          # Only commit if there are staged changes (idempotent)
          git diff --cached --quiet || git commit -m "data: regenerate klines cache parquets [skip ci]

Automatically generated by .github/workflows/cache-klines.yml.
Contains XRPUSDT 15min (Binance+Bitunix stitched) and 1min (Bitunix)."
          git push
