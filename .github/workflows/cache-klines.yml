name: Generate klines cache

# Triggers:
#   1. push — runs automatically on any branch push so it can be triggered
#      from feature branches (workflow_dispatch only works from default branch).
#      A guard step skips the expensive fetch if the 15min parquet is committed
#      and the 1min parquet is already in the Actions cache.
#   2. workflow_dispatch — manual re-run to refresh data.
#
# Storage strategy:
#   All parquets stored in GitHub Actions cache (keyed to generate_klines_cache.py hash).
#   15min parquets (~3-5 MB each) — also committed to git for visibility.
#   1min parquets  (~50-150 MB each) — Actions cache only (too large for git).
#   CI restores all parquets from cache, avoiding race conditions with git commits.
#
# Supported symbols: XRPUSDT, BTCUSDT.
# No secrets required — the Bitunix klines endpoint is public.
on:
  push:
    branches: ["**"]
    paths:
      - "scripts/generate_klines_cache.py"
      - ".github/workflows/cache-klines.yml"
  workflow_dispatch:

jobs:
  generate:
    name: Fetch & cache klines parquet
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Try to restore all klines parquets from Actions cache before deciding to skip.
      - name: Restore klines from Actions cache
        id: cache-klines
        uses: actions/cache/restore@v5
        with:
          path: |
            asBack/klines_cache/XRPUSDT_1min.parquet
            asBack/klines_cache/BTCUSDT_1min.parquet
            asBack/klines_cache/XRPUSDT_15min.parquet
            asBack/klines_cache/BTCUSDT_15min.parquet
          key: klines-v3-${{ hashFiles('scripts/generate_klines_cache.py') }}

      # Skip if all parquets are already cached.
      - name: Check if all parquets are available
        id: check
        run: |
          if [ "${{ steps.cache-klines.outputs.cache-hit }}" = "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "All parquets present in cache — skipping fetch."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Cache miss — will fetch and generate parquets."
          fi

      - uses: actions/setup-python@v6
        if: steps.check.outputs.skip == 'false'
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: python -m pip install -r requirements.txt

      - name: Generate klines parquet cache
        if: steps.check.outputs.skip == 'false'
        run: python scripts/generate_klines_cache.py

      # Commit the small 15min parquets back to the branch (stable historical data).
      - name: Commit 15min parquets to branch
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add asBack/klines_cache/XRPUSDT_15min.parquet asBack/klines_cache/BTCUSDT_15min.parquet
          git diff --cached --quiet || (git commit -m "data: regenerate 15min klines cache [skip ci]" && git push)

      # Store all klines parquets in Actions cache.
      - name: Save klines parquets to Actions cache
        if: steps.check.outputs.skip == 'false'
        uses: actions/cache/save@v5
        with:
          path: |
            asBack/klines_cache/XRPUSDT_1min.parquet
            asBack/klines_cache/BTCUSDT_1min.parquet
            asBack/klines_cache/XRPUSDT_15min.parquet
            asBack/klines_cache/BTCUSDT_15min.parquet
          key: klines-v3-${{ hashFiles('scripts/generate_klines_cache.py') }}
